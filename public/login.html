<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen — TLE-3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Instrument+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <div class="nav-logo">TLE<span>.</span>3</div>
    <div class="nav-links">
        <a href="register.html">Registreren</a>
        <a href="login.html" class="active">Inloggen</a>
        <a href="client.html" class="locked">Client</a>
        <a href="apikey.html" class="locked">API Key</a>
    </div>
</nav>

<main>
    <div class="page-deco"><span>02</span>Inloggen</div>
    <div class="container">
        <div class="page-eyebrow">Stap 2 van 4</div>
        <h1>Inloggen</h1>
        <p class="page-sub">Log in met je account om clients en API keys te beheren.</p>

        <div class="card">
            <div class="field">
                <label for="name">Gebruikersnaam</label>
                <input type="text" id="name" placeholder="jouw gebruikersnaam" autocomplete="off">
            </div>
            <div class="field">
                <label for="password">Wachtwoord</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn" id="btn" onclick="doLogin()">
                <span id="btn-text">Inloggen</span>
                <span class="arrow">→</span>
            </button>
            <div class="msg" id="msg"></div>
            <div class="form-footer">
                Nog geen account? <a href="register.html">Registreren</a>
            </div>
        </div>
    </div>
</main>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const prefill = sessionStorage.getItem('prefill_name');
        if (prefill) {
            document.getElementById('name').value = prefill;
            sessionStorage.removeItem('prefill_name');
        }
    });

    async function doLogin() {
        const name     = document.getElementById('name').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('btn');
        const btnText  = document.getElementById('btn-text');

        showMsg('', '');

        if (!name || !password) { showMsg('Vul alle velden in.', 'err'); return; }

        btn.disabled = true;
        btnText.textContent = 'Inloggen...';

        try {
            const res = await fetch('/api/client-users/login', {
                method: 'POST',
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({ name, password })
            });

            const data = await res.json();

            if (res.status === 200) {
                // Sla token en user op in sessionStorage
                sessionStorage.setItem('token', data.token);
                sessionStorage.setItem('userId', data.clientUser._id || data.clientUser.id);
                sessionStorage.setItem('userName', data.clientUser.name);

                showMsg('Welkom, ' + data.clientUser.name + '! Je wordt doorgestuurd...', 'ok');
                setTimeout(() => window.location.href = 'client.html', 1200);
            } else {
                showMsg(data || 'Gebruikersnaam of wachtwoord klopt niet.', 'err');
            }
        } catch (e) {
            showMsg('Verbindingsfout: ' + e.message, 'err');
        }

        btn.disabled = false;
        btnText.textContent = 'Inloggen';
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.className = 'msg ' + (type || '');
        el.textContent = text;
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
